# ************** This file is automatically generated. Any modifications will be lost ************************

name: About
on:
  push:
    branches:
      - main
  workflow_dispatch:
permissions:
  contents: read
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  update-about:
    name: Update About
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout mytsdevs workspace
        uses: actions/checkout@v6.0.2
        with:
          repository: parischap/mytsdevs
          token: ${{ secrets.MYTSDEVS_PAT }}
          submodules: recursive
      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.8
        with:
          version: 11.9.0
          run_install: true
      - name: Install Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: latest
          cache: pnpm
          registry-url: https://registry.npmjs.org/
      - name: Update GitHub About
        working-directory: packages/rolldown-plugin-pure
        env:
          GH_TOKEN: ${{ secrets.MYTSDEVS_PAT }}
        run: pnpm update-github-about